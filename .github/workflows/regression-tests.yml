# Regression tests workflow - runs tests against deployed API endpoints
name: Regression Tests

on:
  # Allow manual trigger with environment selection
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment to test'
        required: true
        options:
          - uat
          - ops
      test_suite:
        type: choice
        description: 'Test suite to run'
        required: false
        default: 'all'
        options:
          - smoke
          - all
          - version_d

  # Can be called by other workflows after deployment
  workflow_call:
    inputs:
      environment:
        description: 'Environment to test (uat or ops)'
        required: true
        type: string
      test_suite:
        description: 'Test suite to run (smoke, all, version_d)'
        required: false
        type: string
        default: 'smoke'

jobs:
  smoke-tests:
    name: Smoke Tests (${{ inputs.environment }})
    runs-on: ubuntu-latest
    env:
      POETRY_VERSION: "2.3.2"
      PYTHON_VERSION: "3.12"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Setup virtual environment
        run: |
          poetry config virtualenvs.create true --local
          poetry config virtualenvs.in-project true --local

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ./.venv
          key: venv-regression-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with test

      - name: Run Smoke Tests
        env:
          HYDROCRON_ENV: ${{ inputs.environment }}
        run: |
          poetry run pytest tests/regression/test_smoke.py -v -m smoke \
            --tb=short \
            --junit-xml=smoke-test-results.xml

      - name: Upload Smoke Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-results-${{ inputs.environment }}
          path: smoke-test-results.xml

      - name: Smoke Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Smoke Tests - ${{ inputs.environment }}
          path: smoke-test-results.xml
          reporter: java-junit

  full-regression-tests:
    name: Full Regression Tests (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: smoke-tests
    # Only run full suite if explicitly requested or if smoke tests passed
    if: |
      always() &&
      (inputs.test_suite == 'all' || inputs.test_suite == 'version_d') &&
      needs.smoke-tests.result == 'success'
    env:
      POETRY_VERSION: "2.3.2"
      PYTHON_VERSION: "3.12"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Setup virtual environment
        run: |
          poetry config virtualenvs.create true --local
          poetry config virtualenvs.in-project true --local

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ./.venv
          key: venv-regression-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with test

      - name: Run Full Regression Suite
        if: inputs.test_suite == 'all'
        env:
          HYDROCRON_ENV: ${{ inputs.environment }}
        run: |
          poetry run pytest tests/regression/ -v \
            --tb=short \
            --junit-xml=regression-test-results.xml \
            --html=regression-report.html \
            --self-contained-html

      - name: Run Version D Tests Only
        if: inputs.test_suite == 'version_d'
        env:
          HYDROCRON_ENV: ${{ inputs.environment }}
        run: |
          poetry run pytest tests/regression/ -v -m version_d \
            --tb=short \
            --junit-xml=regression-test-results.xml \
            --html=regression-report.html \
            --self-contained-html

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: full-regression-results-${{ inputs.environment }}
          path: |
            regression-test-results.xml
            regression-report.html

      - name: Full Regression Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Full Regression Tests - ${{ inputs.environment }}
          path: regression-test-results.xml
          reporter: java-junit

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const testResult = '${{ job.status }}' === 'success' ? '✅ PASSED' : '❌ FAILED';
            const environment = '${{ inputs.environment }}'.toUpperCase();

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Regression Tests ${testResult}\n\n**Environment:** ${environment}\n**Test Suite:** ${{ inputs.test_suite }}\n\nSee workflow run for details: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [smoke-tests, full-regression-tests]
    if: always()

    steps:
      - name: Check Results
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Test Suite:** ${{ inputs.test_suite || 'smoke' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.smoke-tests.result }}" == "success" ]; then
            echo "- ✅ Smoke Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Smoke Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.full-regression-tests.result }}" == "success" ]; then
            echo "- ✅ Full Regression: PASSED" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.full-regression-tests.result }}" == "skipped" ]; then
            echo "- ⏭️ Full Regression: SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Full Regression: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if tests failed
        if: |
          needs.smoke-tests.result == 'failure' ||
          (needs.full-regression-tests.result == 'failure' && inputs.test_suite != 'smoke')
        run: |
          echo "::error::Regression tests failed"
          exit 1
